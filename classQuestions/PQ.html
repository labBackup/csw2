        // Question 1

        document.getElementById('ques2').innerHTML =

        } else {

        }
        // Question 5
        function checkNums(){
            let num = document.getElementById('numQ5').value;
            if (num > 0){
                document.getElementById('ques5').innerHTML = "Is positive"
            } else if (num == 0) {
                document.getElementById('ques5').innerHTML = "Is zero"
            } else {
                document.getElementById('ques5').innerHTML = "Is negative"
            }
        }

                    string = string + index + "<br>";
                    console.log(string)
                    document.getElementById('ques6').innerHTML = string;
                }

            }
        }

        function question7(){
            var num = document.getElementById('ques7num').value
            var fact = 1;
            for (let index = 1; index <= num ; index++) {
                fact = fact * index;
            }
            document.getElementById('ques7').innerHTML = num+"! = "+fact;
        }
