<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Syntax Example</title>
</head>
<body>
    <h2>JavaScript Syntax Basics Example</h2>
    <p id='result'> </p>
    <script>
        let x = 10;
        let y = 20;
        let sum = x + y;
        if (sum > 20){
            document.getElementById("result").innerHTML = x + " + "+ y + " = " + sum;
        }
        console.log(sum);
    </script>
</body>
</html>
